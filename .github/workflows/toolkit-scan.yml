name: Scan image

on:
  workflow_call:
    inputs:
      docker-tag:
        required: true
        type: string
      fail-on:
        required: false
        default: "medium"
        type: string

permissions:
  contents: read
  packages: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Scan image
        uses: ckotzbauer/actions-toolkit/grype@0.54.5 # 0.54.3
        with:
          scan-target: ${{ inputs.docker-tag }}
          fail-on: ${{ inputs.fail-on }}
          config-file: ".github/grype.yaml"
          format: "sarif"
          output: "results.sarif"

      - name: Upload SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@4dd16135b69a43b6c8efb853346f8437d92d3c93 # v3.28.16
        with:
          sarif_file: results.sarif
          category: grype
