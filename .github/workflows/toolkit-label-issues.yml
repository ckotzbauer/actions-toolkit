name: Label issues

on:
  workflow_call:
    secrets:
      token:
        required: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  label-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@09d2acae674a48949e3602304ab46fd20ae0c42f
      - name: label
        uses: ckotzbauer/label-command-action@c30cd929bd98a409e0a522cb425908c347c419db
        env:
          GITHUB_TOKEN: "${{ secrets.token }}"
