name: Label issues

on:
  workflow_call:
    secrets:
      token:
        required: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  label-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@09d2acae674a48949e3602304ab46fd20ae0c42f
      - name: label
        uses: ckotzbauer/label-command-action@ca5ca1788bae3f87a5963c366f7af4474e7ee49a
        env:
          GITHUB_TOKEN: "${{ secrets.token }}"
