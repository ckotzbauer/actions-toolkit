name: Label issues

on:
  workflow_call:
    secrets:
      token:
        required: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  label-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
      - name: label
        uses: ckotzbauer/label-command-action@f1a219fa7268e340e8eb88070be9cd54796fb501
        env:
          GITHUB_TOKEN: "${{ secrets.token }}"
