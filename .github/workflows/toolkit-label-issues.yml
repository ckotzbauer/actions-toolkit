name: Label issues

on:
  workflow_call:
    secrets:
      token:
        required: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  label-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8edcb1bdb4e267140fa742c62e395cd74f332709
      - name: label
        uses: ckotzbauer/label-command-action@49c6d1529933d8733228a93f1b29d8f84fae805b
        env:
          GITHUB_TOKEN: "${{ secrets.token }}"
