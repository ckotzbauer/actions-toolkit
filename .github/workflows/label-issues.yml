name: Label Issues
on:
  issue_comment:
    types:
      - created
      - edited
  pull_request:
    types:
      - opened
  issues:
    types:
      - opened

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: label
        uses: ckotzbauer/label-command-action@c91f6fdb0d909afa84c26768cf3df81fc948186d
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
