name: Label Issues
on:
  issue_comment:
    types:
      - created
      - edited
  pull_request:
    types:
      - opened
  issues:
    types:
      - opened

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8edcb1bdb4e267140fa742c62e395cd74f332709
      - name: label
        uses: ckotzbauer/label-command-action@49c6d1529933d8733228a93f1b29d8f84fae805b
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
