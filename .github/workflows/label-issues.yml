name: Label Issues
on:
  issue_comment:
    types:
      - created
      - edited
  pull_request:
    types:
      - opened
  issues:
    types:
      - opened

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@09d2acae674a48949e3602304ab46fd20ae0c42f
      - name: label
        uses: ckotzbauer/label-command-action@c30cd929bd98a409e0a522cb425908c347c419db
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
