name: Label Issues
on:
  issue_comment:
    types:
      - created
      - edited
  pull_request:
    types:
      - opened
  issues:
    types:
      - opened

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871
      - name: label
        uses: ckotzbauer/label-command-action@39e6619b5c0fa2155e0ea656af753a92b75aed4a
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
