name: Release Toolkit

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0
          token: ${{ secrets.REPO_ACCESS }}

      - name: Update versions
        shell: bash
        run: |
          LAST_TAG=$(git describe --abbrev=0 --tags)
          LAST_SHA=$(git rev-list -1 "${LAST_TAG}")
          find .github/workflows/toolkit-*.yml | while read -r a; do
              sed -i "s#@${LAST_SHA}#@${{ github.event.inputs.version }}#g" $a;
              sed -i "s# ${LAST_TAG}\$# ${{ github.event.inputs.version }}#g" $a;
          done
          sed -i "s#@${LAST_SHA}#@${{ github.event.inputs.version }}#g" .github/workflows/release-toolkit.yml;
          sed -i "s# ${LAST_TAG}\$# ${{ github.event.inputs.version }}#g" .github/workflows/release-toolkit.yml;

      - name: Generate Changelog
        uses: ckotzbauer/changelog-generator@4e1bac38b88eeeb047eb75596a11d91af7d95b97
        with:
          release-version: ${{ github.event.inputs.version }}
          github-handle: ${{ github.repository }}
          commit-output: commits.md

      - name: Push release
        uses: ckotzbauer/actions-toolkit/push-release@4d43609588f06b292be03b3c2c39c8c9ee36abaf # 0.53.0
        with:
          version: ${{ github.event.inputs.version }}
          pat: ${{ secrets.REPO_ACCESS }}
          prerelease: ${{ contains(github.event.inputs.version, 'alpha') || contains(github.event.inputs.version, 'beta') || contains(github.event.inputs.version, 'rc') }}
