name: Build and test

on:
  workflow_call:
    inputs:
      platform:
        required: false
        default: "ubuntu-latest"
        type: string
      install-go:
        required: false
        default: false
        type: boolean
      go-version:
        required: false
        default: "1.26"
        type: string
      go-cache-dependency-path:
        description: "Path to Go dependency file(s) for cache key generation (e.g. 'go.sum', 'subdir/**/go.sum')."
        required: false
        default: ""
        type: string
      install-node:
        required: false
        default: false
        type: boolean
      node-version:
        required: false
        default: 24
        type: string
      node-cache:
        description: "Node.js package manager for caching ('npm', 'yarn', 'pnpm'). Empty to disable."
        required: false
        default: "npm"
        type: string
      node-cache-dependency-path:
        description: "Path to Node.js dependency file(s) for cache key generation."
        required: false
        default: ""
        type: string
      install-dotnet:
        required: false
        default: false
        type: boolean
      dotnet-version:
        required: false
        default: "9.0.x"
        type: string
      dotnet-cache-dependency-path:
        description: "Path to .NET dependency file(s) for cache key generation."
        required: false
        default: ""
        type: string
      install-python:
        required: false
        default: false
        type: boolean
      python-version:
        required: false
        default: "3.13"
        type: string
      python-cache:
        description: "Python package manager for caching ('pip', 'pipenv', 'poetry'). Empty to disable."
        required: false
        default: "pip"
        type: string
      python-cache-dependency-path:
        description: "Path to Python dependency file(s) for cache key generation."
        required: false
        default: ""
        type: string
      install-goreleaser:
        required: false
        default: false
        type: boolean
      goreleaser-version:
        required: false
        type: string
        default: v2.13.3
      install-kubebuilder:
        required: false
        default: false
        type: boolean
      kubebuilder-version:
        required: false
        type: string
        default: 3.1.0
      install-kubectl:
        required: false
        default: false
        type: boolean
      kubectl-version:
        required: false
        type: string
        default: v1.35.1
      install-cosign:
        required: false
        default: false
        type: boolean
      install-awscli:
        required: false
        default: false
        type: boolean
      install-syft:
        required: false
        default: false
        type: boolean
      build-commands:
        required: false
        type: string
        default: ""
      test-commands:
        required: false
        type: string
        default: ""
      build-image:
        required: false
        default: false
        type: boolean
      docker-tag:
        required: false
        type: string
      docker-context:
        required: false
        default: "."
        type: string
      docker-file:
        required: false
        default: ""
        type: string
      docker-push:
        required: false
        default: false
        type: boolean
      docker-load:
        required: false
        default: true
        type: boolean
      docker-platforms:
        required: false
        default: linux/amd64
        type: string
      docker-cache-from:
        description: "Docker build cache source (e.g. 'type=gha', 'type=registry,ref=myimage:cache')."
        required: false
        default: "type=gha"
        type: string
      docker-cache-to:
        description: "Docker build cache destination (e.g. 'type=gha,mode=max')."
        required: false
        default: "type=gha,mode=max"
        type: string
      scan-image:
        required: false
        default: false
        type: boolean
      report-coverage:
        required: false
        default: false
        type: boolean
      coverage-file:
        required: false
        type: string
    secrets:
      encrypted-build-secrets:
        required: false
      encrypted-test-secrets:
        required: false
      ghcr-password:
        required: false

permissions:
  actions: read
  contents: read

jobs:
  build:
    runs-on: ${{ inputs.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup Go
        if: ${{ inputs.install-go == true }}
        uses: ckotzbauer/actions-toolkit/setup-go@0.55.9 # 0.54.3
        with:
          version: ${{ inputs.go-version }}
          cache-dependency-path: ${{ inputs.go-cache-dependency-path }}

      - name: Setup Node
        if: ${{ inputs.install-node == true }}
        uses: ckotzbauer/actions-toolkit/setup-nodejs@0.55.9 # 0.54.3
        with:
          version: ${{ inputs.node-version }}
          cache: ${{ inputs.node-cache }}
          cache-dependency-path: ${{ inputs.node-cache-dependency-path }}

      - name: Setup Dotnet
        if: ${{ inputs.install-dotnet == true }}
        uses: ckotzbauer/actions-toolkit/setup-dotnet@0.55.9 # 0.54.3
        with:
          version: ${{ inputs.dotnet-version }}
          cache-dependency-path: ${{ inputs.dotnet-cache-dependency-path }}

      - name: Setup Python
        if: ${{ inputs.install-python == true }}
        uses: ckotzbauer/actions-toolkit/setup-python@0.55.9 # 0.54.3
        with:
          version: ${{ inputs.python-version }}
          cache: ${{ inputs.python-cache }}
          cache-dependency-path: ${{ inputs.python-cache-dependency-path }}

      - name: Setup Cosign
        if: ${{ inputs.install-cosign == true }}
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0
        with:
          cosign-release: "v3.0.5"

      - name: Setup GoReleaser
        if: ${{ inputs.install-goreleaser == true }}
        uses: goreleaser/goreleaser-action@4be059cdedc660b9567bdf0a6f2824c3d2fe653f
        with:
          version: ${{ inputs.goreleaser-version }}
          install-only: true

      - name: Cache Kubebuilder
        if: ${{ inputs.install-kubebuilder == true }}
        id: cache-kubebuilder
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: /usr/local/kubebuilder/bin
          key: kubebuilder-${{ inputs.kubebuilder-version }}-${{ runner.os }}

      - name: Setup Kubebuilder
        if: ${{ inputs.install-kubebuilder == true && steps.cache-kubebuilder.outputs.cache-hit != 'true' }}
        uses: RyanSiu1995/kubebuilder-action@7170cb0476187070ae04cbb6cee305e809de2693
        with:
          version: ${{ inputs.kubebuilder-version }}

      - name: Restore Kubebuilder PATH
        if: ${{ inputs.install-kubebuilder == true && steps.cache-kubebuilder.outputs.cache-hit == 'true' }}
        run: echo "/usr/local/kubebuilder/bin" >> $GITHUB_PATH
        shell: sh

      - name: Cache AWS CLI
        if: ${{ inputs.install-awscli == true }}
        id: cache-awscli
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            /usr/local/aws-cli
            /usr/local/bin/aws
          key: awscli-${{ runner.os }}

      - name: Setup AWS CLI
        if: ${{ inputs.install-awscli == true && steps.cache-awscli.outputs.cache-hit != 'true' }}
        uses: unfor19/install-aws-cli-action@f5b46b7f32cf5e7ebd652656c5036bf83dd1e60c

      - name: Setup Kubectl
        if: ${{ inputs.install-kubectl == true }}
        uses: azure/setup-kubectl@901a10e89ea615cf61f57ac05cecdf23e7de06d8 # v3.2
        with:
          version: ${{ inputs.kubectl-version }}

      - name: Setup Syft
        if: ${{ inputs.install-syft == true }}
        uses: ckotzbauer/actions-toolkit/setup-syft@0.55.9 # 0.54.3

      - name: Build
        if: ${{ inputs.build-commands != '' }}
        env:
          ENCRYPTED_BUILD_SECRETS: ${{ secrets.encrypted-build-secrets }}
        run: ${{ inputs.build-commands }}

      - name: Test
        if: ${{ inputs.test-commands != '' }}
        env:
          ENCRYPTED_TEST_SECRETS: ${{ secrets.encrypted-test-secrets }}
        run: ${{ inputs.test-commands }}

      - name: Report coverage
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
        if: ${{ inputs.report-coverage == true }}
        with:
          files: ${{ inputs.coverage-filt }}

      - name: Build image
        if: ${{ inputs.build-image == true }}
        uses: ckotzbauer/actions-toolkit/docker@0.55.9 # 0.54.3
        with:
          context: ${{ inputs.docker-context }}
          ghcr-password: ${{ secrets.ghcr-password }}
          file: ${{ inputs.docker-file }}
          push: ${{ inputs.docker-push }}
          load: ${{ inputs.docker-load }}
          platforms: ${{ inputs.docker-platforms }}
          cache-from: ${{ inputs.docker-cache-from }}
          cache-to: ${{ inputs.docker-cache-to }}
          tags: |
            ${{ inputs.docker-tag }}

      - name: Scan image
        if: ${{ inputs.scan-image == true }}
        uses: ckotzbauer/actions-toolkit/grype@0.55.9 # 0.54.3
        with:
          scan-target: ${{ inputs.docker-tag }}
          fail-on: "medium"
          config-file: ".github/grype.yaml"
