name: 'Setup Node'
description: 'Installs nodejs'
inputs:
  version:
    description: "Node version to install."
    required: false
    default: "24"
  cache:
    description: "Package manager for dependency caching (e.g. 'npm', 'yarn', 'pnpm'). Empty to disable."
    required: false
    default: "npm"
  cache-dependency-path:
    description: "Path to dependency file(s) for cache key generation (e.g. 'subdir/package-lock.json')."
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
      with:
        node-version: ${{ inputs.version }}
        cache: ${{ inputs.cache }}
        cache-dependency-path: ${{ inputs.cache-dependency-path }}
