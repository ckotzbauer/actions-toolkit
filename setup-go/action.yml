name: 'Setup Go'
description: 'Installs golang'
inputs:
  version:
    description: "Go version to install."
    required: false
    default: "1.23.4"
runs:
  using: "composite"
  steps:
    - name: Setup Golang
      uses: actions/setup-go@c4c114188661c0fa735e5b938764519fc6e8efa9
      with:
        go-version: ${{ inputs.version }}
