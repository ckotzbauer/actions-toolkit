name: 'Setup Go'
description: 'Installs golang'
inputs:
  version:
    description: "Go version to install."
    required: false
    default: "1.25.0"
runs:
  using: "composite"
  steps:
    - name: Setup Golang
      uses: actions/setup-go@c0137caad775660c0844396c52da96e560aba63d
      with:
        go-version: ${{ inputs.version }}
