name: 'Setup Go'
description: 'Installs golang'
inputs:
  version:
    description: "Go version to install."
    required: false
    default: "1.24.4"
runs:
  using: "composite"
  steps:
    - name: Setup Golang
      uses: actions/setup-go@8e57b58e57be52ac95949151e2777ffda8501267
      with:
        go-version: ${{ inputs.version }}
