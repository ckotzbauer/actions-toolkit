name: 'Setup Go'
description: 'Installs golang'
inputs:
  version:
    description: "Go version to install."
    required: false
    default: "1.24.4"
runs:
  using: "composite"
  steps:
    - name: Setup Golang
      uses: actions/setup-go@fa96338abe5531f6e34c5cc0bbe28c1a533d5505
      with:
        go-version: ${{ inputs.version }}
