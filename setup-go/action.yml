name: 'Setup Go'
description: 'Installs golang'
inputs:
  version:
    description: "Go version to install."
    required: false
    default: "1.24.4"
runs:
  using: "composite"
  steps:
    - name: Setup Golang
      uses: actions/setup-go@7c0b336c9aab5e8ed4f0ad8b81225b125f9883e4
      with:
        go-version: ${{ inputs.version }}
