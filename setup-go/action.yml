name: 'Setup Go'
description: 'Installs golang'
inputs:
  version:
    description: "Go version to install."
    required: false
    default: "1.22.5"
runs:
  using: "composite"
  steps:
    - name: Setup Golang
      uses: actions/setup-go@d60b41a563a30eac31c3ec623e6ff0b3f16e1a06
      with:
        go-version: ${{ inputs.version }}
