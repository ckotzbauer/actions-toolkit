name: 'Setup Go'
description: 'Installs golang'
inputs:
  version:
    description: "Go version to install."
    required: false
    default: "1.23.4"
runs:
  using: "composite"
  steps:
    - name: Setup Golang
      uses: actions/setup-go@5a083d0e9a84784eb32078397cf5459adecb4c40
      with:
        go-version: ${{ inputs.version }}
