name: "Setup Go"
description: "Installs golang"
inputs:
  version:
    description: "Go version to install."
    required: false
    default: "1.26"
runs:
  using: "composite"
  steps:
    - name: Setup Golang
      uses: actions/setup-go@8f19afcc704763637be6b1718da0af52ca05785d
      with:
        go-version: ${{ inputs.version }}
