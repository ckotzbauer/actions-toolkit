name: 'Setup Go'
description: 'Installs golang'
inputs:
  version:
    description: "Go version to install."
    required: false
    default: "1.24.5"
runs:
  using: "composite"
  steps:
    - name: Setup Golang
      uses: actions/setup-go@e75c3e80bcde46e322cd5845ae46582947c9becd
      with:
        go-version: ${{ inputs.version }}
