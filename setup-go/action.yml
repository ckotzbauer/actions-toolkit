name: 'Setup Go'
description: 'Installs golang'
inputs:
  version:
    description: "Go version to install."
    required: false
    default: "1.25.0"
runs:
  using: "composite"
  steps:
    - name: Setup Golang
      uses: actions/setup-go@3a0c2c82458cbb45a3cbfeeb2b91ce8f85420560
      with:
        go-version: ${{ inputs.version }}
