name: 'Setup Go'
description: 'Installs golang'
inputs:
  version:
    description: "Go version to install."
    required: false
    default: "1.24.1"
runs:
  using: "composite"
  steps:
    - name: Setup Golang
      uses: actions/setup-go@4de67c04ab4550d5b619aef0b37cd4ec732d7b37
      with:
        go-version: ${{ inputs.version }}
