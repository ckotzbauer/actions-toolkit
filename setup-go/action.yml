name: 'Setup Go'
description: 'Installs golang'
inputs:
  version:
    description: "Go version to install."
    required: false
    default: "1.22.5"
runs:
  using: "composite"
  steps:
    - name: Setup Golang
      uses: actions/setup-go@941977282cd715ac8e0b3adc8555bef6dc794b7e
      with:
        go-version: ${{ inputs.version }}
