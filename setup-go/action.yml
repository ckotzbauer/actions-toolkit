name: "Setup Go"
description: "Installs golang"
inputs:
  version:
    description: "Go version to install."
    required: false
    default: "1.26"
runs:
  using: "composite"
  steps:
    - name: Setup Golang
      uses: actions/setup-go@27fdb267c15a8835f1ead03dfa07f89be2bb741a
      with:
        go-version: ${{ inputs.version }}
