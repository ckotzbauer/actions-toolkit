name: 'Setup Python'
description: 'Installs python'
inputs:
  version:
    description: "Python version to install."
    required: false
    default: "3.13"
runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@28f2168f4d98ee0445e3c6321f6e6616c83dd5ec
      with:
        python-version: ${{ inputs.version }}
