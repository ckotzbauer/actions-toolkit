name: 'Setup Python'
description: 'Installs python'
inputs:
  version:
    description: "Python version to install."
    required: false
    default: "3.12"
runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@f4c5a1183d69690d31b6304b7af403a5b56a88d6
      with:
        python-version: ${{ inputs.version }}
